services:
  db:
    image: postgres:15-alpine
    env_file: ./call-monitor/.env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks: [zentcall-qa]

  app:
    image: ghcr.io/sazlain/call-monitor:qa
    platform: linux/amd64
    env_file: ./call-monitor/.env
    environment:
      - DB_HOST=db
      - APP_BASE_URL=https://qa.app.zentcall.com
      - SERVER_BASE_URL=https://qa.app.zentcall.com
    ports:
      - "8082:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks: [zentcall-qa]

  frontend:
    image: ghcr.io/sazlain/voxio:qa
    platform: linux/amd64
    env_file: ./voxio/.env
    ports:
      - "3002:80"
    restart: unless-stopped
    networks: [zentcall-qa]

  wa-bridge:
    image: ghcr.io/sazlain/zentcall-wa-bridge:qa
    platform: linux/amd64
    environment:
      - BACKEND_URL=http://app:8080
      - BRIDGE_SECRET=${WA_BRIDGE_SECRET:-zentcall-bridge-secret}
      - PORT=3002
      - SESSIONS_DIR=/sessions
    volumes:
      - wa_sessions:/sessions
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks: [zentcall-qa]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
  wa_sessions:

networks:
  zentcall-qa:
    driver: bridge
