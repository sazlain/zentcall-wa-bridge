name: WA Bridge CI/CD

on:
  push:
    branches: [main, qa, develop]
  pull_request:
    branches: [main, qa, develop]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/zentcall-wa-bridge

jobs:
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.branch }}
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.branch }}-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
